services:
  # 主应用服务
  buffgpt-flow-bridge-mcp:
    build: .
    image: buffgpt-flow-bridge-mcp:latest
    container_name: buffgpt-flow-bridge-mcp
    #network_mode: "host"
    restart: always
    ports:
      - "9002:9002"  # HTTP 端口
      #- "9005:9005"  # GRPC 端口
    environment:
      # 服务器配置
      - MCP_SERVER_HTTP_PORT=9002
      - MCP_SERVER_GRPC_PORT=9005

      # 数据库配置（请按环境修改或通过 .env 注入，勿提交真实连接串）
      - MCP_DATA_DATABASE_PG_SOURCE=host=127.0.0.1 user=postgres password=changeme dbname=buffgpt_flow_bridge_mcp port=5432 sslmode=disable TimeZone=Asia/Shanghai

      # Redis 配置
      - MCP_DATA_REDIS_ADDR=127.0.0.1
      - MCP_DATA_REDIS_PORT=6379
      - MCP_DATA_REDIS_USERNAME=
      - MCP_DATA_REDIS_PASSWORD=
      - MCP_DATA_REDIS_DEFAULT_DB=0

      # Nacos 配置
      - MCP_REGISTRY_NACOS_IPADDR=127.0.0.1
      - MCP_REGISTRY_NACOS_PORT=8848
      - MCP_REGISTRY_NACOS_NAMESPACE=public
      - MCP_REGISTRY_NACOS_USERNAME=
      - MCP_REGISTRY_NACOS_PASSWORD=

      # 日志配置
      - MCP_LOG_LEVEL=info
      - MCP_LOG_PATH=./logs/log.log
    volumes:
      - ./logs:/app/logs:Z
      - ./tmp:/app/tmp:Z
    networks:
      - buffgpt-flow-bridge

networks:
  buffgpt-flow-bridge:
    driver: bridge
    name: buffgpt-flow-bridge
