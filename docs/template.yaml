openapi: 3.0.4
info:
  title: Swagger Petstore - OpenAPI 3.0
  description: |-
    这是一个基于 OpenAPI 3.0 规范的示例宠物商店服务器。
    您可以在 [https://swagger.io](https://swagger.io) 找到更多关于 Swagger 的信息。
    在宠物商店的第三个版本中，我们转向了设计优先的方法！
    您现在可以通过修改定义本身或代码来帮助我们改进API。
  termsOfService: https://swagger.io/terms/
  contact:
    email: apiteam@swagger.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.12
externalDocs:
  description: 了解更多关于 Swagger 的信息
  url: https://swagger.io
servers:
  - url: https://petstore3.swagger.io/api/v3
    description: 生产环境 API v3
  - url: https://petstore3.swagger.io/api/v2
    description: 生产环境 API v2
  - url: http://petstore3.swagger.io/api/v3
    description: 测试环境 API v3 (HTTP)
  - url: http://petstore3.swagger.io/api/v2
    description: 测试环境 API v2 (HTTP)
tags:
  - name: pet
    description: 关于您的宠物的一切
    externalDocs:
      description: 了解更多
      url: https://swagger.io
  - name: store
    description: 访问宠物商店订单
    externalDocs:
      description: 了解更多关于我们商店的信息
      url: https://swagger.io
  - name: user
    description: 用户相关操作
paths:
  /pet:
    put:
      tags:
        - pet
      summary: 更新现有宠物
      description: 通过ID更新现有宠物
      operationId: updatePet
      requestBody:
        description: 更新商店中的现有宠物
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
          application/xml:
            schema:
              $ref: '#/components/schemas/Pet'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Pet'
        required: true
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
            application/xml:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: 提供的ID无效
        '404':
          description: 未找到宠物
        '422':
          description: 验证异常
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用HTTP Basic认证
      security:
        - http_basic: []
    post:
      tags:
        - pet
      summary: 向商店添加新宠物
      description: 向商店添加新宠物
      operationId: addPet
      requestBody:
        description: 在商店中创建新宠物
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
          application/xml:
            schema:
              $ref: '#/components/schemas/Pet'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Pet'
        required: true
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
            application/xml:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: 输入无效
        '422':
          description: 验证异常
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用HTTP Basic认证
      security:
        - http_basic: []
  /pet/findByStatus:
    get:
      tags:
        - pet
      summary: 根据状态查找宠物
      description: 可以使用逗号分隔的字符串提供多个状态值
      operationId: findPetsByStatus
      parameters:
        - name: status
          in: query
          description: 需要用于过滤的状态值
          required: false
          explode: true
          schema:
            type: string
            default: available
            enum:
              - available  # 可用
              - pending   # 待定
              - sold      # 已售出
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: 状态值无效
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用API Key认证
      security:
        - api_key: []
  /pet/findByTags:
    get:
      tags:
        - pet
      summary: 根据标签查找宠物
      description: 可以使用逗号分隔的字符串提供多个标签。使用 tag1, tag2, tag3 进行测试
      operationId: findPetsByTags
      parameters:
        - name: tags
          in: query
          description: 用于过滤的标签
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: 标签值无效
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用API Key认证
      security:
        - api_key: []
  /pet/{petId}:
    get:
      tags:
        - pet
      summary: 通过ID查找宠物
      description: 返回单个宠物
      operationId: getPetById
      parameters:
        - name: petId
          in: path
          description: 要返回的宠物ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
            application/xml:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: 提供的ID无效
        '404':
          description: 未找到宠物
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用Bearer Token认证
      security:
        - bearer_token: []
    post:
      tags:
        - pet
      summary: 使用表单数据更新商店中的宠物
      description: 基于表单数据更新宠物资源
      operationId: updatePetWithForm
      parameters:
        - name: petId
          in: path
          description: 需要更新的宠物ID
          required: true
          schema:
            type: integer
            format: int64
        - name: name
          in: query
          description: 需要更新的宠物名称
          schema:
            type: string
        - name: status
          in: query
          description: 需要更新的宠物状态
          schema:
            type: string
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
            application/xml:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: 输入无效
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用HTTP Basic认证
      security:
        - http_basic: []
    delete:
      tags:
        - pet
      summary: 删除宠物
      description: 删除宠物
      operationId: deletePet
      parameters:
        - name: api_key
          in: header
          description: API密钥
          required: true
          schema:
            type: string
        - name: petId
          in: path
          description: 要删除的宠物ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 宠物已删除
        '400':
          description: 宠物值无效
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用API Key认证
      security:
        - api_key: []
  /pet/{petId}/uploadImage:
    post:
      tags:
        - pet
      summary: 上传图片
      description: 上传宠物图片
      operationId: uploadFile
      parameters:
        - name: petId
          in: path
          description: 要更新的宠物ID
          required: true
          schema:
            type: integer
            format: int64
        - name: additionalMetadata
          in: query
          description: 附加元数据
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: 未上传文件
        '404':
          description: 未找到宠物
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用Bearer Token认证
      security:
        - bearer_token: []
  /store/inventory:
    get:
      tags:
        - store
      summary: 按状态返回宠物库存
      description: 返回状态码到数量的映射
      operationId: getInventory
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用API Key认证
      security:
        - api_key: []
  /store/order:
    post:
      tags:
        - store
      summary: 为宠物下订单
      description: 在商店中下新订单
      operationId: placeOrder
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
          application/xml:
            schema:
              $ref: '#/components/schemas/Order'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: 输入无效
        '422':
          description: 验证异常
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用Bearer Token认证
      security:
        - bearer_token: []
  /store/order/{orderId}:
    get:
      tags:
        - store
      summary: 通过ID查找采购订单
      description: 对于有效响应，尝试使用值 <= 5 或 > 10 的整数ID。其他值将生成异常
      operationId: getOrderById
      parameters:
        - name: orderId
          in: path
          description: 需要获取的订单ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
            application/xml:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: 提供的ID无效
        '404':
          description: 未找到订单
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用API Key认证
      security:
        - api_key: []
    delete:
      tags:
        - store
      summary: 按标识符删除采购订单
      description: 对于有效响应，尝试使用值 < 1000 的整数ID。任何高于1000或非整数的值都会生成API错误
      operationId: deleteOrder
      parameters:
        - name: orderId
          in: path
          description: 需要删除的订单ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 订单已删除
        '400':
          description: 提供的ID无效
        '404':
          description: 未找到订单
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用Bearer Token认证
      security:
        - bearer_token: []
  /user:
    post:
      tags:
        - user
      summary: 创建用户
      description: 这只能由登录用户完成
      operationId: createUser
      requestBody:
        description: 创建的用户对象
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/xml:
            schema:
              $ref: '#/components/schemas/User'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
            application/xml:
              schema:
                $ref: '#/components/schemas/User'
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用HTTP Basic认证
      security:
        - http_basic: []
  /user/createWithList:
    post:
      tags:
        - user
      summary: 使用给定的输入数组创建用户列表
      description: 使用给定的输入数组创建用户列表
      operationId: createUsersWithListInput
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/User'
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
            application/xml:
              schema:
                $ref: '#/components/schemas/User'
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用HTTP Basic认证
      security:
        - http_basic: []
  /user/login:
    get:
      tags:
        - user
      summary: 用户登录系统
      description: 登录系统
      operationId: loginUser
      parameters:
        - name: username
          in: query
          description: 登录的用户名
          required: false
          schema:
            type: string
        - name: password
          in: query
          description: 明文登录密码
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 操作成功
          headers:
            X-Rate-Limit:
              description: 用户允许的每小时调用次数
              schema:
                type: integer
                format: int32
            X-Expires-After:
              description: token过期的UTC日期
              schema:
                type: string
                format: date-time
          content:
            application/xml:
              schema:
                type: string
            application/json:
              schema:
                type: string
        '400':
          description: 提供的用户名/密码无效
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 登录接口无需认证
      security: []
  /user/logout:
    get:
      tags:
        - user
      summary: 注销当前登录的用户会话
      description: 将用户注销出系统
      operationId: logoutUser
      parameters: []
      responses:
        '200':
          description: 操作成功
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 注销接口无需认证
      security: []
  /user/{username}:
    get:
      tags:
        - user
      summary: 通过用户名获取用户
      description: 基于用户名获取用户详细信息
      operationId: getUserByName
      parameters:
        - name: username
          in: path
          description: 需要获取的名称。使用 user1 进行测试
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
            application/xml:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: 提供的用户名无效
        '404':
          description: 未找到用户
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用API Key认证
      security:
        - api_key: []
    put:
      tags:
        - user
      summary: 更新用户资源
      description: 这只能由登录用户完成
      operationId: updateUser
      parameters:
        - name: username
          in: path
          description: 需要删除的名称
          required: true
          schema:
            type: string
      requestBody:
        description: 更新商店中的现有用户
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          application/xml:
            schema:
              $ref: '#/components/schemas/User'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: 操作成功
        '400':
          description: 请求错误
        '404':
          description: 未找到用户
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用Bearer Token认证
      security:
        - bearer_token: []
    delete:
      tags:
        - user
      summary: 删除用户资源
      description: 这只能由登录用户完成
      operationId: deleteUser
      parameters:
        - name: username
          in: path
          description: 需要删除的名称
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 用户已删除
        '400':
          description: 提供的用户名无效
        '404':
          description: 未找到用户
        default:
          description: 意外错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
      # 使用Bearer Token认证
      security:
        - bearer_token: []
components:
  schemas:
    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        petId:
          type: integer
          format: int64
          example: 198772
        quantity:
          type: integer
          format: int32
          example: 7
        shipDate:
          type: string
          format: date-time
        status:
          type: string
          description: 订单状态
          example: approved
          enum:
            - placed    # 已下单
            - approved  # 已批准
            - delivered # 已交付
        complete:
          type: boolean
      xml:
        name: order
    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Dogs
      xml:
        name: category
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        username:
          type: string
          example: theUser
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: James
        email:
          type: string
          example: john@email.com
        password:
          type: string
          example: '12345'
        phone:
          type: string
          example: '12345'
        userStatus:
          type: integer
          description: 用户状态
          format: int32
          example: 1
      xml:
        name: user
    Tag:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
      xml:
        name: tag
    Pet:
      required:
        - name
        - photoUrls
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: doggie
        category:
          $ref: '#/components/schemas/Category'
        photoUrls:
          type: array
          xml:
            wrapped: true
          items:
            type: string
            xml:
              name: photoUrl
        tags:
          type: array
          xml:
            wrapped: true
          items:
            $ref: '#/components/schemas/Tag'
        status:
          type: string
          description: 宠物在商店中的状态
          enum:
            - available  # 可用
            - pending   # 待定
            - sold      # 已售出
      xml:
        name: pet
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
        type:
          type: string
        message:
          type: string
      xml:
        name: '##default'
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
      required:
        - code
        - message
  requestBodies:
    Pet:
      description: 需要添加到商店的宠物对象
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Pet'
        application/xml:
          schema:
            $ref: '#/components/schemas/Pet'
    UserArray:
      description: 用户对象列表
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/User'
  securitySchemes:
    # API Key认证方案
    api_key:
      type: apiKey
      name: api_key
      in: header
      description: API密钥认证，在请求头中传递

    # HTTP Basic认证方案
    http_basic:
      type: http
      scheme: basic
      description: HTTP Basic认证，使用用户名和密码

    # Bearer Token认证方案
    bearer_token:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer Token认证，使用JWT令牌