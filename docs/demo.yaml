      # 接口的请求参数信息
      parameters:
        # 定义名为 username 的路径参数
        - name: username
          # 参数位置，此参数为路径参数
          in: path
          # 参数描述，此处原描述有误，应是需要更新的用户的名称，当前为 "name that need to be deleted" 需修正
          description: name that need to be deleted
          # 标记该参数为必需项
          required: true
          # 参数的 schema 定义
          schema:
            # 参数类型为字符串
            type: string
      # 请求体信息
      requestBody:
        # 请求体的描述，说明该请求体用于更新商店中已存在的用户
        description: Update an existent user in the store
        # 请求体支持的内容类型及对应的 schema
        content:
          # 支持 JSON 格式的请求体，其 schema 引用 components/schemas 下的 User 定义
          application/json:
            schema:
              $ref: '#/components/schemas/User'
          # 支持 XML 格式的请求体，其 schema 引用 components/schemas 下的 User 定义
          application/xml:
            schema:
              $ref: '#/components/schemas/User'
          # 支持表单编码格式的请求体，其 schema 引用 components/schemas 下的 User 定义
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/User'
      # 接口的响应信息
      responses:
        # 状态码 200 表示操作成功，用户信息更新成功
        '200':
          description: successful operation
        # 状态码 400 表示请求无效
        '400':
          description: bad request
        # 状态码 404 表示未找到对应的用户
        '404':
          description: user not found
        # 默认响应，用于处理其他未预料到的错误
        default:
          description: Unexpected error
          # 默认响应的内容，使用 JSON 格式，引用 Error 模式
          content:
            # 指定内容类型为 JSON
            application/json:
              # 定义响应的 schema，引用 components 中的 Error 定义
              schema:
                $ref: "#/components/schemas/Error"
    # DELETE 方法，用于根据用户名删除用户
    delete:
      # 接口所属的标签，此接口属于 "user" 标签
      tags:
        - user
      # 接口的简短描述，说明该接口用于删除用户资源
      summary: Delete user resource.
      # 接口的详细描述，说明只有已登录的用户才能执行此操作
      description: This can only be done by the logged in user.
      # 接口操作的唯一标识符，用于在代码中引用该接口
      operationId: deleteUser
      # 接口的请求参数信息
      parameters:
        # 定义名为 username 的路径参数
        - name: username
          # 参数位置，此参数为路径参数
          in: path
          # 参数描述，说明该参数是需要删除的用户的名称
          description: The name that needs to be deleted
          # 标记该参数为必需项
          required: true
          # 参数的 schema 定义
          schema:
            # 参数类型为字符串
            type: string
      # 接口的响应信息
      responses:
        # 状态码 200 表示操作成功，用户已删除
        '200':
          description: User deleted
        # 状态码 400 表示提供的用户名无效
        '400':
          description: Invalid username supplied
        # 状态码 404 表示未找到对应的用户
        '404':
          description: User not found
        # 默认响应，用于处理其他未预料到的错误
        default:
          description: Unexpected error
          # 默认响应的内容，使用 JSON 格式，引用 Error 模式
          content:
            # 指定内容类型为 JSON
            application/json:
              # 定义响应的 schema，引用 components 中的 Error 定义
              schema:
                $ref: "#/components/schemas/Error"
# components 组件部分，用于定义可复用的 schema、请求体、安全方案等
components:
  # schemas 部分，用于定义数据模型
  schemas:
    # Order 模型，用于表示订单信息
    Order:
      # 数据类型为对象
      type: object
      # 定义对象的属性
      properties:
        # id 属性，订单的唯一标识
        id:
          # 属性类型为整数
          type: integer
          # 整数格式为 64 位整数
          format: int64
          # 属性示例值
          example: 10
        # petId 属性，订单关联的宠物 ID
        petId:
          # 属性类型为整数
          type: integer
          # 整数格式为 64 位整数
          format: int64
          # 属性示例值
          example: 198772
        # quantity 属性，订单中宠物的数量
        quantity:
          # 属性类型为整数
          type: integer
          # 整数格式为 32 位整数
          format: int32
          # 属性示例值
          example: 7
        # shipDate 属性，订单的发货日期
        shipDate:
          # 属性类型为字符串
          type: string
          # 字符串格式为日期时间
          format: date-time
        # status 属性，订单的状态
        status:
          # 属性类型为字符串
          type: string
          # 属性描述，说明该属性表示订单状态
          description: Order Status
          # 属性示例值
          example: approved
          # 属性允许的枚举值
          enum:
            - placed
            - approved
            - delivered
        # complete 属性，订单是否完成
        complete:
          # 属性类型为布尔值
          type: boolean
      # XML 相关配置，指定 XML 元素名称为 order
      xml:
        name: order
    # Category 模型，用于表示宠物分类信息
    Category:
      # 数据类型为对象
      type: object
      # 定义对象的属性
      properties:
        # id 属性，分类的唯一标识
        id:
          # 属性类型为整数
          type: integer
          # 整数格式为 64 位整数
          format: int64
          # 属性示例值
          example: 1
        # name 属性，分类的名称
        name:
          # 属性类型为字符串
          type: string
          # 属性示例值
          example: Dogs
      # XML 相关配置，指定 XML 元素名称为 category
      xml:
        name: category
    # User 模型，用于表示用户信息
    User:
      # 数据类型为对象
      type: object
      # 定义对象的属性
      properties:
        # id 属性，用户的唯一标识
        id:
          # 属性类型为整数
          type: integer
          # 整数格式为 64 位整数
          format: int64
          # 属性示例值
          example: 10
        # username 属性，用户的用户名
        username:
          # 属性类型为字符串
          type: string
          # 属性示例值
          example: theUser
        # firstName 属性，用户的名字
        firstName:
          # 属性类型为字符串
          type: string
          # 属性示例值
          example: John
        # lastName 属性，用户的姓氏
        lastName:
          # 属性类型为字符串
          type: string
          # 属性示例值
          example: James
        # email 属性，用户的电子邮箱
        email:
          # 属性类型为字符串
          type: string
          # 属性示例值
          example: john@email.com
        # password 属性，用户的密码
        password:
          # 属性类型为字符串
          type: string
          # 属性示例值
          example: '12345'
        # phone 属性，用户的电话号码
        phone:
          # 属性类型为字符串
          type: string
          # 属性示例值
          example: '12345'
        # userStatus 属性，用户的状态
        userStatus:
          # 属性类型为整数
          type: integer
          # 属性描述，说明该属性表示用户状态
          description: User Status
          # 整数格式为 32 位整数
          format: int32
          # 属性示例值
          example: 1
      # XML 相关配置，指定 XML 元素名称为 user
      xml:
        name: user
    # Tag 模型，用于表示宠物标签信息
    Tag:
      # 数据类型为对象
      type: object
      # 定义对象的属性
      properties:
        # id 属性，标签的唯一标识
        id:
          # 属性类型为整数
          type: integer
          # 整数格式为 64 位整数
          format: int64
        # name 属性，标签的名称
        name:
          # 属性类型为字符串
          type: string
      # XML 相关配置，指定 XML 元素名称为 tag
      xml:
        name: tag
    # Pet 模型，用于表示宠物信息
    Pet:
      # 定义必需的属性
      required:
        - name
        - photoUrls
      # 数据类型为对象
      type: object
      # 定义对象的属性
      properties:
        # id 属性，宠物的唯一标识
        id:
          # 属性类型为整数
          type: integer
          # 整数格式为 64 位整数
          format: int64
          # 属性示例值
          example: 10
        # name 属性，宠物的名称
        name:
          # 属性类型为字符串
          type: string
          # 属性示例值
          example: doggie
        # category 属性，宠物所属的分类，引用 Category 模型
        category:
          $ref: '#/components/schemas/Category'
        # photoUrls 属性，宠物的照片 URL 列表
        photoUrls:
          # 属性类型为数组
          type: array
          # XML 相关配置，指定数组元素是否包装
          xml:
            wrapped: true
          # 数组元素的定义
          items:
            # 元素类型为字符串
            type: string
            # XML 相关配置，指定 XML 元素名称为 photoUrl
            xml:
              name: photoUrl
        # tags 属性，宠物的标签列表
        tags:
          # 属性类型为数组
          type: array
          # XML 相关配置，指定数组元素是否包装
          xml:
            wrapped: true
          # 数组元素的定义，引用 Tag 模型
          items:
            $ref: '#/components/schemas/Tag'
        # status 属性，宠物在商店中的状态
        status:
          # 属性类型为字符串
          type: string
          # 属性描述，说明该属性表示宠物在商店中的状态
          description: pet status in the store
          # 属性允许的枚举值
          enum:
            - available
            - pending
            - sold
      # XML 相关配置，指定 XML 元素名称为 pet
      xml:
        name: pet
    # ApiResponse 模型，用于表示 API 响应信息
    ApiResponse:
      # 数据类型为对象
      type: object
      # 定义对象的属性
      properties:
        # code 属性，响应的代码
        code:
          # 属性类型为整数
          type: integer
          # 整数格式为 32 位整数
          format: int32
        # type 属性，响应的类型
        type:
          # 属性类型为字符串
          type: string
        # message 属性，响应的消息
        message:
          # 属性类型为字符串
          type: string
      # XML 相关配置，指定 XML 元素名称为 ##default
      xml:
        name: '##default'
    # Error 模型，用于表示错误信息
    Error:
      # 数据类型为对象
      type: object
      # 定义对象的属性
      properties:
        # code 属性，错误代码
        code:
          # 属性类型为字符串
          type: string
        # message 属性，错误消息
        message:
          # 属性类型为字符串
          type: string
      # 定义必需的属性
      required:
        - code
        - message
  # requestBodies 部分，用于定义可复用的请求体
  requestBodies:
    # Pet 请求体，用于添加宠物到商店
    Pet:
      # 请求体的描述，说明该请求体是需要添加到商店的宠物对象
      description: Pet object that needs to be added to the store
      # 请求体支持的内容类型及对应的 schema
      content:
        # 支持 JSON 格式的请求体，其 schema 引用 components/schemas 下的 Pet 定义
        application/json:
          schema:
            $ref: '#/components/schemas/Pet'
        # 支持 XML 格式的请求体，其 schema 引用 components/schemas 下的 Pet 定义
        application/xml:
          schema:
            $ref: '#/components/schemas/Pet'
    # UserArray 请求体，用于批量创建用户
    UserArray:
      # 请求体的描述，说明该请求体是用户对象列表
      description: List of user object
      # 请求体支持的内容类型及对应的 schema
      content:
        # 支持 JSON 格式的请求体，请求体为一个用户数组，每个元素引用 components/schemas 下的 User 定义
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/User'
  # securitySchemes 部分，用于定义安全认证方案
  securitySchemes:
    # petstore_auth 安全认证方案，使用 OAuth2 认证
    petstore_auth:
      # 认证类型为 OAuth2
      type: oauth2
      # OAuth2 认证流程
      flows:
        # 隐式授权流程
        implicit:
          # 授权 URL
          authorizationUrl: https://petstore3.swagger.io/oauth/authorize
          # 授权范围
          scopes:
            # write:pets 范围，允许修改账户中的宠物信息
            "write:pets": modify pets in your account
            # read:pets 范围，允许读取账户中的宠物信息
            "read:pets": read your pets
    # api_key 安全认证方案，使用 API 密钥认证
    api_key:
      # 认证类型为 API 密钥
      type: apiKey
      # API 密钥的名称
      name: api_key
      # API 密钥的位置，位于请求头中
      in: header