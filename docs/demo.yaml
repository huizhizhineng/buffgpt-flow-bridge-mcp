              schema:
                $ref: "#/components/schemas/Error"
      # 接口所需的安全认证信息，使用 api_key 认证方案
      security:
        - api_key: []
  # 定义 /store/order 路径，该路径支持 POST 方法，用于在商店中为宠物下订单
  /store/order:
