            application/json:
              # 定义响应的 schema，引用 components 中的 Error 定义
              schema:
                $ref: "#/components/schemas/Error"
  # 定义 /store/order/{orderId} 路径，用于根据订单 ID 对订单进行操作
  /store/order/{orderId}:
    # GET 方法，用于根据订单 ID 查找采购订单
    get:
      # 接口所属的标签，此接口属于 "store" 标签
      tags:
        - store
      # 接口的简短描述，说明该接口用于根据订单 ID 查找采购订单
      summary: Find purchase order by ID.
      # 接口的详细描述，说明使用小于等于 5 或大于 10 的整数 ID 可获得有效响应，其他值会引发异常
      description: For valid response try integer IDs with value <= 5 or > 10. Other values will generate exceptions.
      # 接口操作的唯一标识符，用于在代码中引用该接口
      operationId: getOrderById
      # 接口的请求参数信息
      parameters:
        # 定义名为 orderId 的路径参数
        - name: orderId
          # 参数位置，此参数为路径参数
          in: path
          # 参数描述，说明该参数是需要获取的订单的 ID
          description: ID of order that needs to be fetched
          # 标记该参数为必需项
          required: true
          # 参数的 schema 定义
          schema:
            # 参数类型为整数
            type: integer
            # 整数格式为 64 位整数
            format: int64
      # 接口的响应信息
      responses:
        # 状态码 200 表示操作成功，返回查找到的订单信息
        '200':
          description: successful operation
          # 响应支持的内容类型及对应的 schema
          content:
            # 支持 JSON 格式的响应体，其 schema 引用 components/schemas 下的 Order 定义
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
            # 支持 XML 格式的响应体，其 schema 引用 components/schemas 下的 Order 定义
            application/xml:
              schema:
                $ref: '#/components/schemas/Order'
        # 状态码 400 表示提供的订单 ID 无效
        '400':
          description: Invalid ID supplied
        # 状态码 404 表示未找到对应的订单
        '404':
          description: Order not found
        # 默认响应，用于处理其他未预料到的错误
        default:
          description: Unexpected error
          # 默认响应的内容，使用 JSON 格式，引用 Error 模式
          content:
            # 指定内容类型为 JSON
            application/json:
              # 定义响应的 schema，引用 components 中的 Error 定义
              schema:
                $ref: "#/components/schemas/Error"
    # DELETE 方法，用于根据订单 ID 删除采购订单
    delete:
      # 接口所属的标签，此接口属于 "store" 标签
      tags:
        - store
      # 接口的简短描述，说明该接口用于根据订单 ID 删除采购订单
      summary: Delete purchase order by identifier.
      # 接口的详细描述，说明使用小于 1000 的整数 ID 可获得有效响应，其他值会引发 API 错误
      description: For valid response try integer IDs with value < 1000. Anything above 1000 or nonintegers will generate API errors.
      # 接口操作的唯一标识符，用于在代码中引用该接口
      operationId: deleteOrder
      # 接口的请求参数信息
      parameters:
        # 定义名为 orderId 的路径参数
        - name: orderId
          # 参数位置，此参数为路径参数
          in: path
          # 参数描述，说明该参数是需要删除的订单的 ID
          description: ID of the order that needs to be deleted
          # 标记该参数为必需项
          required: true
          # 参数的 schema 定义
          schema:
            # 参数类型为整数
            type: integer
            # 整数格式为 64 位整数
            format: int64
      # 接口的响应信息
      responses:
        # 状态码 200 表示操作成功，订单已删除
        '200':
          description: order deleted
        # 状态码 400 表示提供的订单 ID 无效
        '400':
          description: Invalid ID supplied
        # 状态码 404 表示未找到对应的订单
        '404':
          description: Order not found
        # 默认响应，用于处理其他未预料到的错误
        default:
          description: Unexpected error
          # 默认响应的内容，使用 JSON 格式，引用 Error 模式
          content:
            # 指定内容类型为 JSON
            application/json:
              # 定义响应的 schema，引用 components 中的 Error 定义
              schema:
                $ref: "#/components/schemas/Error"
