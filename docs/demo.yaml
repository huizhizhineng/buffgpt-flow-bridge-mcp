          description: Unexpected error
          # 默认响应的内容，使用 JSON 格式，引用 Error 模式
          content:
            # 指定内容类型为 JSON
            application/json:
              # 定义响应的 schema，引用 components 中的 Error 定义
              schema:
                $ref: "#/components/schemas/Error"
