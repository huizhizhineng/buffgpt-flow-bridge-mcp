  # 定义 /user/login 路径，用于用户登录系统
  /user/login:
    # GET 方法，用于用户登录系统
    get:
      # 接口所属的标签，此接口属于 "user" 标签
      tags:
        - user
      # 接口的简短描述，说明该接口用于用户登录系统
      summary: Logs user into the system.
      # 接口的详细描述，说明该接口用于用户登录系统
      description: Log into the system.
      # 接口操作的唯一标识符，用于在代码中引用该接口
      operationId: loginUser
      # 接口的请求参数信息
      parameters:
        # 定义名为 username 的查询参数
        - name: username
          # 参数位置，此参数为查询参数
          in: query
          # 参数描述，说明该参数是用户登录使用的用户名
          description: The user name for login
          # 标记该参数为非必需项
          required: false
          # 参数的 schema 定义
          schema:
            # 参数类型为字符串
            type: string
        # 定义名为 password 的查询参数
        - name: password
          # 参数位置，此参数为查询参数
          in: query
          # 参数描述，说明该参数是用户登录使用的明文密码
          description: The password for login in clear text
          # 标记该参数为非必需项
          required: false
          # 参数的 schema 定义
          schema:
            # 参数类型为字符串
            type: string
      # 接口的响应信息
      responses:
        # 状态码 200 表示操作成功，用户登录成功
        '200':
          description: successful operation
          # 响应头信息
          headers:
            # X-Rate-Limit 响应头，说明用户每小时允许的调用次数
            X-Rate-Limit:
              description: calls per hour allowed by the user
              schema:
                # 响应头值类型为整数
                type: integer
                # 整数格式为 32 位整数
                format: int32
            # X-Expires-After 响应头，说明令牌过期的 UTC 时间
            X-Expires-After:
              description: date in UTC when token expires
              schema:
                # 响应头值类型为字符串
                type: string
                # 字符串格式为日期时间
                format: date-time
          # 响应支持的内容类型及对应的 schema
          content:
            # 支持 XML 格式的响应体，响应体为字符串类型
            application/xml:
              schema:
                type: string
            # 支持 JSON 格式的响应体，响应体为字符串类型
            application/json:
              schema:
                type: string
        # 状态码 400 表示提供的用户名或密码无效
        '400':
          description: Invalid username/password supplied
        # 默认响应，用于处理其他未预料到的错误
